<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../lab css file/lab.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</head>
<body>
    <center>
    <div class="container-md">
     <table>
        <h2>Laboratory Details Form</h2>
    
      <tr>
        <td>Patient Name</td>
        <td><input type="text" name="patient_name" required></td>
      </tr>
      <tr>
        <td>Patient ID</td>
        <td><input type="text" name="patient_id" required></td>
      </tr>
      <tr>
        <td>Age</td>
        <td><input type="number" name="age" required></td>
      </tr>
      <tr>
        <td>Gender</td>
        <td>
          <select name="gender" required>
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>Test Type</td>
        <td><input type="text" name="test_type" required></td>
      </tr>
      <tr>
        <td>Doctor's Name</td>
        <td><input type="text" name="doctor_name"></td>
      </tr>
      <tr>
        <td>Sample Collection Date</td>
        <td><input type="date" name="collection_date" required></td>
      </tr>
    </table>
    <button type="submit" class="submit-btn">Submit</button>
  </form>
    </div>
        
    </center>

    
</body>
</html>
