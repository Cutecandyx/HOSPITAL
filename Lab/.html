<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../lab css file/lab.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</head>
<body>
    <center>
    <div class="container-md">
        <form>
            <h1>LAB REGISTERATION FORM</h1>
            <table cellspacing="10" cellpadding="10">
            <tr>
            <td><label>PATIENT_ID</label></td>
            <td><input type="text" name="registration_id" placeholder="Enter Patient ID"></td>
            </tr>
        <tr>
            <td><label>PATIENT_NAME</label></td>
            <td><input type="text" name="patient_name" placeholder="Eenter Patient Name"></td>
        </tr>
        <tr>
            <td><label>GENDER</label></td>
            <td><select >
                <option value="chose your gender">chose your gender</option>
                <option value="male">male</option>
                <option value="female">female</option>
                <option value="other">other</option>
            </select></td>
        </tr>
        <tr>
            <td><label>DATE_Of_BIRTH</label></td>
            <td><input type ="date"placeholder="Select Dob"></td>
        </tr>
        <tr>
            <td><label>MOBILE_NUMBER</label></td>
            <td><input type="number" name="contact_number" placeholder="Enter Contact Number"></td>
        </tr>
        <tr>
            <td><label>PATIENT_DET</label></td>
            <td><select >
                <option value="select patiend det">select patiend det</option>
                <option value="in patient">in patient</option>
                <option value="out patient">out patient</option>
            </select></td>
        </tr>
        <tr>
            <td><label>TEST_DET</label></td>
            <td><select>
                <option value="select test">select test</option>
                <option value="blood test">blood test</option>
                <option value="urine test">urine test</option>
                <option value="x-ray">x-ray</option>
                <option value="ct scan">ct scan</option>
                <option value="mri">mri</option>
            </select></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="SUBMIT"></td>
        </tr>
        </table>
        </form>
    </div>
    </center>

    
</body>
</html>
